name: Appium Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  appium-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      APPIUM_SERVER_URL: http://127.0.0.1:4723/wd/hub
      APPIUM_DEVICE_NAME: Android Emulator
      APPIUM_APP: ${{ github.workspace }}/app/build/outputs/apk/debug/app-debug.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Run Appium smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          profile: pixel_6
          script: |
            adb wait-for-device
            appium --base-path /wd/hub > appium.log 2>&1 &
            ./gradlew testDebugUnitTest -PincludeAppiumTests=true --tests com.saucelabs.mydemoapp.android.AppiumLoginTest

      - name: Upload Appium reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-smoke-artifacts
          path: |
            appium.log
            app/build/reports/tests/
